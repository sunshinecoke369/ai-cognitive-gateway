# AI Cognitive Gateway — Logrotate 配置
# 安装方式：
#   sudo cp deploy/logrotate.conf /etc/logrotate.d/ai-gateway
#   sudo logrotate -f /etc/logrotate.d/ai-gateway  # 立即测试
#
# 此配置同时管理：
#   - /tmp/gateway.log       ← systemd 服务的 stdout/stderr
#   - /app/gateway/logs/gateway.log   ← 应用结构化日志
#
# 注意：Docker 环境下日志走 docker logs，此配置仅适用于 WSL/systemd 部署

/tmp/gateway.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    maxsize 10M
}

/root/ai-cognitive-gateway/logs/gateway.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    maxsize 50M
}

/root/ai-cognitive-gateway/logs/audit.jsonl {
    daily
    rotate 90
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    maxsize 100M
}
